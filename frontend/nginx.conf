server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every unknown path serves index.html so client-side
    # routing takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed asset bundles are immutable — let the browser cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # index.html and env.js must not be cached or new deploys won't be seen.
    location = /index.html {
        add_header Cache-Control "no-store" always;
    }
    location = /env.js {
        add_header Cache-Control "no-store" always;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/javascript application/json application/xml
               text/css text/plain text/xml image/svg+xml;

    # Security headers — the .NET API also sets its own on API responses;
    # these protect the SPA itself.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # No server tokens leaked in headers / error pages.
    server_tokens off;
}
