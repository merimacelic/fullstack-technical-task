name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

permissions:
  # Container registry write permission only granted when actually publishing
  # (pushes to main / tags). PRs stay read-only.
  contents: read
  packages: write

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  REGISTRY: ghcr.io
  # Image names derived from the repo slug — lowercased because ghcr requires it.
  API_IMAGE_NAME: ${{ github.repository }}/api
  SPA_IMAGE_NAME: ${{ github.repository }}/frontend

jobs:
  backend:
    name: Backend — build, test, docker
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build (warnings as errors enforced via csproj)
        run: dotnet build --configuration Release --no-restore

      - name: Run unit + architecture tests
        run: |
          dotnet test tests/TaskManagement.Domain.UnitTests --configuration Release --no-build \
            --logger "trx;LogFileName=domain.trx" --collect:"XPlat Code Coverage"
          dotnet test tests/TaskManagement.Application.UnitTests --configuration Release --no-build \
            --logger "trx;LogFileName=application.trx" --collect:"XPlat Code Coverage"
          dotnet test tests/TaskManagement.ArchitectureTests --configuration Release --no-build \
            --logger "trx;LogFileName=architecture.trx"

      - name: Run integration tests (Testcontainers needs host Docker — available on ubuntu-latest)
        run: |
          dotnet test tests/TaskManagement.Api.IntegrationTests --configuration Release --no-build --logger "trx;LogFileName=integration.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: "**/coverage.cobertura.xml"

      # Docker build exercises the production Dockerfile on every commit to catch
      # image regressions (missing files, analyzer errors on Linux, etc.) early.
      # On pushes to main (or a tag), we additionally push to GHCR so the Azure
      # Bicep deployment can pull the image. PRs only build — they don't push.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute API image tags
        id: api-tags
        run: |
          lower="${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}"
          lower_lc="$(echo "$lower" | tr '[:upper:]' '[:lower:]')"
          tags="$lower_lc:${{ github.sha }}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            tags="$tags,$lower_lc:latest"
          fi
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tag_name="${GITHUB_REF##refs/tags/}"
            tags="$tags,$lower_lc:$tag_name"
          fi
          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Build (and push on main/tags) API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/TaskManagement.Api/Dockerfile
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
          tags: ${{ steps.api-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    name: Frontend — lint, typecheck, test, docker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + component tests
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SPA image tags
        id: spa-tags
        run: |
          lower="ghcr.io/${{ github.repository }}/frontend"
          lower_lc="$(echo "$lower" | tr '[:upper:]' '[:lower:]')"
          tags="$lower_lc:${{ github.sha }}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            tags="$tags,$lower_lc:latest"
          fi
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tag_name="${GITHUB_REF##refs/tags/}"
            tags="$tags,$lower_lc:$tag_name"
          fi
          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Build (and push on main/tags) frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
          tags: ${{ steps.spa-tags.outputs.tags }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
